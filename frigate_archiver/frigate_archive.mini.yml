# archive_deploy.yml
- name: Deploy Frigate archival systemd script
  hosts: "{{ target_hosts }}"
  become: yes
  tasks:

    - name: Deploy archival script
      copy:
        src: frigate-archive.sh
        dest: /usr/local/bin/frigate-archive.sh
        mode: '0755'
      tags: deploy

    - name: Deploy systemd service
      copy:
        src: frigate-archive.service.j2
        dest: /etc/systemd/system/frigate-archive.service
        mode: '0644'
      tags: deploy

    - name: Deploy systemd timer
      copy:
        src: frigate-archive.timer.j2
        dest: /etc/systemd/system/frigate-archive.timer
        mode: '0644'
      tags: deploy

    - name: Reload systemd (after deployment)
      command: systemctl daemon-reexec
      tags: deploy

    # This will only run when --tags activate is passed explicitly
    - name: Enable and start the archival timer
      systemd:
        name: frigate-archive.timer
        enabled: true
        state: started
      tags: activate
