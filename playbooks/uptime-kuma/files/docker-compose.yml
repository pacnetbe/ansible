services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: UptimeKuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma-secure.rule=Host(`kuma.lan`)"
      - "traefik.http.routers.uptime-kuma-secure.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma-secure.tls=true"
      - "traefik.http.routers.uptime-kuma-secure.service=uptime-kuma-svc"
      - "traefik.http.routers.uptime-kuma-plain.rule=Host(`kuma.pacnet.be`)"
      - "traefik.http.routers.uptime-kuma-plain.entrypoints=web"
      - "traefik.http.routers.uptime-kuma-plain.service=uptime-kuma-svc"
      - "traefik.http.services.uptime-kuma-svc.loadbalancer.server.port=3001"
    networks:
      - proxy

volumes:
  uptime_kuma_data:
    external: true

networks:
  proxy:
    external: true

