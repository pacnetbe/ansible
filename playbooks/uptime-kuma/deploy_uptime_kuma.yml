---
- name: Deploy Uptime Kuma
  hosts: "{{ deploy_target | default('pi4-01') }}"
  become: true

  vars:
    app_dir: "{{ docker_base_dir }}/uptime-kuma"

  tasks:
    - name: Create Uptime Kuma directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: files/docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Deploy Uptime Kuma
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        state: present

