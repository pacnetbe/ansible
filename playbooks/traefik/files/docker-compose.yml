services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.54
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/traefik.yml:ro
    networks:
      - proxy

networks:
  proxy:
    name: proxy

