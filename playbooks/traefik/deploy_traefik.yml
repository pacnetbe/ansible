---
- name: Deploy Traefik reverse proxy
  hosts: "{{ deploy_target | default('traefik_hosts') }}"
  become: true

  vars:
    traefik_dir: "{{ docker_base_dir }}/traefik"

  tasks:
    - name: Create Traefik directory
      file:
        path: "{{ traefik_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: files/docker-compose.yml
        dest: "{{ traefik_dir }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Copy traefik.yml
      copy:
        src: files/traefik.yml
        dest: "{{ traefik_dir }}/traefik.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Start Traefik with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        state: present
        remove_orphans: true

