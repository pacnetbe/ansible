---
- name: Deploy Traefik reverse proxy
  hosts: pi4-01
  become: true

  vars:
    traefik_dir: /home/pacnetadmin/docker/traefik

  tasks:
    - name: Create Traefik directory
      file:
        path: "{{ traefik_dir }}"
        state: directory
        owner: pacnetadmin
        group: pacnetadmin
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: files/docker-compose.yml
        dest: "{{ traefik_dir }}/docker-compose.yml"
        owner: pacnetadmin
        group: pacnetadmin
        mode: "0644"

    - name: Copy traefik.yml
      copy:
        src: files/traefik.yml
        dest: "{{ traefik_dir }}/traefik.yml"
        owner: pacnetadmin
        group: pacnetadmin
        mode: "0644"

    - name: Start Traefik with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_dir }}"
        state: present
