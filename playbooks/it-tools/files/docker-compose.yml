services:
  it-tools:
    container_name: it-tools
    image: corentinth/it-tools:latest
    ports:
      - '8081:80'
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.it-tools-secure.rule=Host(`it-tools.lan`)"
      - "traefik.http.routers.it-tools-secure.entrypoints=websecure"
      - "traefik.http.routers.it-tools-secure.tls=true"
      - "traefik.http.routers.it-tools-secure.service=it-tools-svc"
      - "traefik.http.routers.it-tools-plain.rule=Host(`it-tools.pacnet.be`)"
      - "traefik.http.routers.it-tools-plain.entrypoints=web"
      - "traefik.http.routers.it-tools-plain.service=it-tools-svc"
      - "traefik.http.services.it-tools-svc.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true

