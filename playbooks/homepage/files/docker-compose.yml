services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3010:3000
    volumes:
      - ./config:/app/config
      - ./images:/app/public/images
      - ./icons:/app/public/icons
    environment:
      PUID: 1000
      PGID: 1000
      HOMEPAGE_ALLOWED_HOSTS: "homepage.pacnet.be,homepage.lan,pserver04.lan:3010"
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage-secure.rule=Host(`homepage.lan`)"
      - "traefik.http.routers.homepage-secure.entrypoints=websecure"
      - "traefik.http.routers.homepage-secure.tls=true"
      - "traefik.http.routers.homepage-secure.service=homepage-svc"
      - "traefik.http.routers.homepage-plain.rule=Host(`homepage.pacnet.be`)"
      - "traefik.http.routers.homepage-plain.entrypoints=web"
      - "traefik.http.routers.homepage-plain.service=homepage-svc"
      - "traefik.http.services.homepage-svc.loadbalancer.server.port=3000"
    networks:
      - proxy

networks:
  proxy:
    external: true

