- name: Ensure Docker CE and Docker Compose are installed
  hosts: pserver04
  become: yes
  vars:
    # You can override ansible_python_interpreter if needed.
    # ansible_python_interpreter: /usr/bin/python3.12
  tasks:
    - name: Check if Docker (Docker CE) is installed
      command: docker --version
      register: docker_installed
      ignore_errors: yes

    - name: Install prerequisites for Docker CE
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Add Docker's official GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: docker_installed.rc != 0

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
      when: docker_installed.rc != 0

    - name: Install Docker CE, Docker CE CLI, and containerd.io
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      when: docker_installed.rc != 0

    - name: Ensure docker service is running and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Check if Docker Compose (plugin) is installed
      command: docker compose version
      register: docker_compose_installed
      ignore_errors: yes

    - name: Install Docker Compose plugin if not present
      apt:
        name: docker-compose-plugin
        state: present
        update_cache: yes
      when: docker_compose_installed.rc != 0

    - name: Ensure python3-pip is installed (if needed for further Python-based docker-compose usage)
      apt:
        name: python3-pip
        state: present
