---
- name: Deploy Portainer Agent
  hosts: "{{ deploy_target | default('portainer_agents') }}"
  become: true

  vars:
    portainer_dir: "{{ docker_base_dir }}/portainer"

  tasks:
    - name: Create Portainer directory
      file:
        path: "{{ portainer_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: files/docker-compose.yml
        dest: "{{ portainer_dir }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Start Portainer agent with docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ portainer_dir }}"
        state: present

