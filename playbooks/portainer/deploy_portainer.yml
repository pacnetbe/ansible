---
- name: Deploy Portainer CE
  hosts: "{{ deploy_target | default('pi5-01') }}"
  become: true

  vars:
    portainer_dir: "{{ docker_base_dir }}/portainer"

  tasks:
    - name: Create Portainer directory
      file:
        path: "{{ portainer_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      copy:
        src: files/portainer-compose.yml
        dest: "{{ portainer_dir }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Deploy Portainer CE
      community.docker.docker_compose_v2:
        project_src: "{{ portainer_dir }}"
        state: present

