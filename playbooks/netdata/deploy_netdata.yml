---
- name: Deploy NetData
  hosts: "{{ deploy_target | default('docker_hosts') }}"
  become: true

  vars:
    netdata_dir: "{{ docker_base_dir }}/netdata"

  tasks:
    - name: Create NetData directory
      file:
        path: "{{ netdata_dir }}"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0755"

    - name: Copy docker-compose.yml
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ netdata_dir }}/docker-compose.yml"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Deploy NetData
      community.docker.docker_compose_v2:
        project_src: "{{ netdata_dir }}"
        state: present

